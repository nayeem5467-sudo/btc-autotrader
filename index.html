  <button class="nav-btn" onclick="go('perf')" id="n-perf"><span style="font-size:16px">📈</span>P&L</button>

<script>
const BACKEND = 'https://btcapp-1000204866378.europe-west1.run.app';

// ═══ STATE ════════════════════════════════════════════════════
const S = {
  screen:'trade',
  // BTC live
  btcPrice:0, btcChg:0, btcPrev:0,
  c5:[], // 5m candles for analysis
  // Polymarket live 5-min market
  pm:{
    upPrice:0, downPrice:0,  // current odds in cents (0-100)
    upPayout:0, downPayout:0, // payout multipliers
    priceToBeat:0,           // BTC price at start of current window
    windowStart:0,           // ms timestamp
    windowEnd:0,             // ms timestamp
    marketSlug:'btc-updown-5m',
    loaded:false
  },
  // Signal from Binance analysis
  signal:{dir:'—', conf:0, reason:''},
  // Active trade
  active:null, // {id,dir,odds,payout,stake,entry,priceToBeat,windowEnd,at}
  // Closed trades
  trades:[],
  // Finance
  startBal:1000,
  // Martingale
  mart:{on:false,base:10,mult:1,losses:0,maxBet:180},
  nextStake:10,
  // Log
  log:[],
  // Perf filter
  pfPeriod:'today',
  // Loading state
  refreshing:false
};

// ═══ PERSISTENCE ══════════════════════════════════════════════
function save(){
  const d={trades:S.trades,startBal:S.startBal,active:S.active,
    mart:S.mart,nextStake:S.nextStake,log:S.log.slice(0,100),savedAt:Date.now()};
  fetch(BACKEND+'/api/state',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify(d)}).catch(()=>{});
  try{localStorage.setItem('pm5m_v1',JSON.stringify(d));}catch(e){}
}
async function load(){
  let d=null;
  try{
    const r=await fetch(BACKEND+'/api/state');
    if(r.ok){const j=await r.json();if(j&&j.savedAt)d=j;}
  }catch(e){}
  if(!d){try{d=JSON.parse(localStorage.getItem('pm5m_v1')||'null');}catch(e){}}
  if(!d)return;
  S.trades=d.trades||[];
  S.startBal=d.startBal||1000;
  S.mart=d.mart||S.mart;
  S.nextStake=d.nextStake||10;
  S.log=d.log||[];
  const now=Date.now();
  // Only restore active if not expired
  S.active=(d.active&&d.active.windowEnd>now)?d.active:null;
  const age=Math.round((now-(d.savedAt||0))/60000);
  addLog('♻️ Restored: '+S.trades.length+' trades · $'+trueBalance().toFixed(2)+' ('+age+'m ago)','ok');
}

// ═══ HELPERS ══════════════════════════════════════════════════
function trueBalance(){
  const pnl=S.trades.reduce((a,t)=>a+(t.pnl||0),0);
  const open=S.active?S.active.stake:0;
  return +(S.startBal+pnl-open).toFixed(2);
}
const fmt=n=>n?n.toLocaleString(undefined,{maximumFractionDigits:0}):'—';
const fmtIST=ts=>new Date(ts).toLocaleTimeString('en-IN',{timeZone:'Asia/Kolkata',hour:'2-digit',minute:'2-digit',hour12:true});
function cur5mEnd(){return(Math.floor(Date.now()/300000)+1)*300000;}
function cur5mStart(){return Math.floor(Date.now()/300000)*300000;}
function addLog(msg,type='info'){S.log.unshift({msg,type,ts:Date.now(),price:S.btcPrice});if(S.log.length>150)S.log.pop();}
function showToast(msg,type='info'){
  let t=document.querySelector('.toast');if(t)t.remove();
  t=document.createElement('div');t.className='toast';t.textContent=msg;
  const bg={win:'#00c853',loss:'#c62828',ok:'#1a237e',warn:'#e65100',info:'#1a1a44'};
  t.style.background=bg[type]||'#1a1a44';t.style.color='#fff';
  document.body.appendChild(t);setTimeout(()=>{if(t.parentNode)t.remove();},3500);
}
function go(s){S.screen=s;['trade','perf','hist'].forEach(x=>document.getElementById('n-'+x).classList.toggle('on',x===s));render();}

// ═══ INDICATORS (for signal) ══════════════════════════════════
function ema(d,p){if(d.length<p)return[d[d.length-1]||0];const k=2/(p+1);let e=d.slice(0,p).reduce((a,b)=>a+b,0)/p;const r=[e];for(let i=p;i<d.length;i++){e=d[i]*k+e*(1-k);r.push(e);}return r;}
function rsiF(c,p=14){if(c.length<p+1)return 50;let g=0,l=0;for(let i=1;i<=p;i++){const d=c[i]-c[i-1];d>0?g+=d:l-=d;}let ag=g/p,al=l/p;for(let i=p+1;i<c.length;i++){const d=c[i]-c[i-1];ag=(ag*(p-1)+Math.max(d,0))/p;al=(al*(p-1)+Math.max(-d,0))/p;}return al===0?100:100-100/(1+ag/al);}
function macdF(c){if(c.length<26)return{h:0};const e12=ema(c,12),e26=ema(c,26),off=e12.length-e26.length;const ml=e26.map((v,i)=>e12[i+off]-v),sl=ema(ml,9);return{h:ml[ml.length-1]-sl[sl.length-1]};}
function bbF(c,p=20){if(c.length<p)return{pct:.5};const s=c.slice(-p),m=s.reduce((a,b)=>a+b)/p;const std=Math.sqrt(s.reduce((a,b)=>a+(b-m)**2)/p);return{pct:(c[c.length-1]-(m-2*std))/(4*std||1)};}

function buildSignal(){
  if(S.c5.length<30){S.signal={dir:'—',conf:0,reason:'Insufficient data'};return;}
  const cls=S.c5.map(c=>c.close),h=S.c5.map(c=>c.high),l=S.c5.map(c=>c.low),vol=S.c5.map(c=>c.volume);
  const rsi=rsiF(cls),macd=macdF(cls),bb=bbF(cls);
  const e9=ema(cls,9),e21=ema(cls,21);
  const last=cls[cls.length-1],le9=e9[e9.length-1],le21=e21[e21.length-1];
  const mom=(last-cls[cls.length-4])/cls[cls.length-4]*100;
  const vr=(vol.slice(-5).reduce((a,b)=>a+b,0)/5)/(vol.slice(-20).reduce((a,b)=>a+b,0)/20||1);
  let up=0,dn=0;
  if(rsi<30)up+=1.5;else if(rsi<40)up+=0.7;else if(rsi>70)dn+=1.5;else if(rsi>60)dn+=0.7;
  if(macd.h>0)up+=1.0;else dn+=1.0;
  if(bb.pct<.2)up+=0.8;else if(bb.pct>.8)dn+=0.8;
  if(last>le9&&le9>le21)up+=1.0;else if(last<le9&&le9<le21)dn+=1.0;
  if(mom>0.3)up+=0.8;else if(mom<-0.3)dn+=0.8;
  if(vr>1.5){mom>0?up+=0.5:dn+=0.5;}
  const dir=up>=dn?'UP':'DOWN';
  const conf=Math.min(95,Math.round(Math.abs(up-dn)/(up+dn||1)*80+40));
  const reasons=[];
  if(rsi<30)reasons.push('RSI oversold '+rsi.toFixed(0));
  else if(rsi>70)reasons.push('RSI overbought '+rsi.toFixed(0));
  if(macd.h>0)reasons.push('MACD bull');else reasons.push('MACD bear');
  if(last>le9)reasons.push('Above EMA9');else reasons.push('Below EMA9');
  S.signal={dir,conf,rsi:rsi.toFixed(1),macd:macd.h.toFixed(3),bb:(bb.pct*100).toFixed(0),
    mom:mom.toFixed(3),reason:reasons.slice(0,3).join(' · '),up:up.toFixed(1),dn:dn.toFixed(1)};
}

// ═══ FETCH POLYMARKET 5-MIN MARKET ════════════════════════════
async function fetchPM(){
  try{
    // Fetch via server proxy
    const r=await fetch(BACKEND+'/api/polymarket');
    if(!r.ok) throw new Error('proxy');
    const data=await r.json();
    const items=Array.isArray(data)?data:[];

    // Find the BTC 5-minute Up or Down market specifically
    const mkt=items.find(m=>{
      const q=(m.question||m.title||'').toLowerCase();
      const slug=(m.slug||m.marketSlug||m.conditionId||'').toLowerCase();
      return (q.includes('btc')||q.includes('bitcoin'))&&
             (q.includes('5 min')||q.includes('5min')||q.includes('5-min')||
              slug.includes('btc-updown-5m')||slug.includes('5m'));
    })||items.find(m=>{
      const q=(m.question||'').toLowerCase();
      return (q.includes('btc')||q.includes('bitcoin'))&&q.includes('up or down');
    });

    if(mkt){
      parsePMMarket(mkt);
      addLog('📊 PM loaded: Up '+S.pm.upPrice+'¢ / Down '+S.pm.downPrice+'¢','ok');
    }else{
      // Try direct market slug endpoint
      await fetchPMDirect();
    }
  }catch(e){
    await fetchPMDirect();
  }
}

async function fetchPMDirect(){
  try{
    // Try the specific market slug
    const r=await fetch(BACKEND+'/api/pm-5m');
    if(r.ok){
      const d=await r.json();
      if(d&&d.upPrice){ Object.assign(S.pm,d,{loaded:true}); render(); return; }
    }
  }catch(e){}
  // Fallback: synthetic from Binance signal
  syntheticPM();
  addLog('⚠️ PM API unavailable — synthetic odds from Binance analysis','warn');
}

function parsePMMarket(mkt){
  const tokens=mkt.tokens||[];
  const up  =tokens.find(t=>(t.outcome||'').toLowerCase()==='up')||
              tokens.find(t=>(t.outcome||'').toLowerCase()==='yes')||tokens[0]||{};
  const down=tokens.find(t=>(t.outcome||'').toLowerCase()==='down')||
              tokens.find(t=>(t.outcome||'').toLowerCase()==='no') ||tokens[1]||{};
  const upP =Math.round(parseFloat(up.price||0.65)*100);
  const dnP =Math.round(parseFloat(down.price||0.35)*100);
  S.pm.upPrice   = upP;
  S.pm.downPrice = dnP;
  S.pm.upPayout  = +(100/upP).toFixed(3);
  S.pm.downPayout= +(100/dnP).toFixed(3);
  S.pm.priceToBeat= S.btcPrice;
  S.pm.windowStart= cur5mStart();
  S.pm.windowEnd  = cur5mEnd();
  S.pm.loaded     = true;
}

function syntheticPM(){
  // Use Binance 24h change to estimate probability
  const chg=S.btcChg;
  const upP=Math.round(Math.min(90,Math.max(30, 52 + chg*2)));
  const dnP=100-upP;
  S.pm.upPrice   = upP;
  S.pm.downPrice = dnP;
  S.pm.upPayout  = +(100/upP).toFixed(3);
  S.pm.downPayout= +(100/dnP).toFixed(3);
  S.pm.priceToBeat= S.btcPrice;
  S.pm.windowStart= cur5mStart();
  S.pm.windowEnd  = cur5mEnd();
  S.pm.loaded     = true;
  S.pm.synthetic  = true;
}

// ═══ FETCH BTC PRICE + CANDLES ════════════════════════════════
async function fetchBTC(){
  try{
    const[tk,kl]=await Promise.all([
      fetch('https://api.binance.com/api/v3/ticker/24hr?symbol=BTCUSDT').then(r=>r.json()),
      fetch('https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=5m&limit=50').then(r=>r.json())
    ]);
    S.btcPrev  = S.btcPrice;
    S.btcPrice = +tk.lastPrice;
    S.btcChg   = +tk.priceChangePercent;
    S.c5 = kl.map(c=>({time:+c[0],open:+c[1],high:+c[2],low:+c[3],close:+c[4],volume:+c[5]}));
    buildSignal();
    // Update synthetic odds if needed
    if(S.pm.synthetic) syntheticPM();
  }catch(e){}
}

// ═══ RECORD BET (called when user places bet on PM) ═══════════
function recordBet(dir){
  if(S.active){ showToast('Trade already open!','warn'); return; }
  const odds  = dir==='UP' ? S.pm.upPrice   : S.pm.downPrice;
  const payout= dir==='UP' ? S.pm.upPayout  : S.pm.downPayout;
  const stake = S.nextStake;
  const bal   = trueBalance();
  if(bal<stake){ showToast('Insufficient balance','warn'); return; }

  S.active={
    id:Date.now(), dir, odds, payout, stake,
    entry:S.btcPrice,
    priceToBeat: S.pm.priceToBeat||S.btcPrice,
    windowEnd: S.pm.windowEnd||cur5mEnd(),
    at:Date.now(),
    potProfit: +(stake*(payout-1)).toFixed(2)
  };

  addLog('✅ RECORDED: '+dir+' $'+stake+' @ '+odds+'¢ ('+payout+'x) | PTB: $'+fmt(S.active.priceToBeat),'trade');
  showToast('Recorded! $'+stake+' '+dir+' @ '+odds+'¢','ok');
  save(); render();
}

// ═══ RESOLVE TRADE ════════════════════════════════════════════
function resolveTrade(){
  if(!S.active) return;
  const a=S.active;
  const exitPrice=S.btcPrice;
  const ptb=a.priceToBeat;

  // Win: BTC moved in predicted direction vs price-to-beat
  const up=exitPrice>ptb;
  const dn=exitPrice<ptb;
  const tie=Math.abs(exitPrice-ptb)<0.01;
  let won=false;
  if(tie){ won=false; } // tie = loss (market resolves DOWN on tie typically)
  else { won=(a.dir==='UP'&&up)||(a.dir==='DOWN'&&dn); }

  // Profit = stake × (payout - 1) on win, -stake on loss
  const pnl = won ? a.potProfit : 0; // stake deducted on placement, pnl=0 on loss

  const closed={...a, exit:exitPrice, priceToBeat:ptb, won, pnl,
    diff:((exitPrice-ptb)/ptb*100).toFixed(3), closedAt:Date.now()};
  S.trades.unshift(closed);
  S.active=null;

  // Martingale
  if(won){
    addLog('🏆 WIN +$'+pnl.toFixed(2)+' | '+a.dir+' ✅ | PTB $'+fmt(ptb)+' → $'+fmt(exitPrice),'result');
    showToast('+$'+pnl.toFixed(2)+' WIN! 🎉','win');
    if(S.mart.losses>0){
      S.mart.mult=1; S.mart.losses=0; S.nextStake=S.mart.base;
      addLog('🎲 Martingale reset to base $'+S.mart.base,'ok');
    }
  }else{
    S.mart.losses++;
    addLog('💸 LOSS -$'+a.stake+' | '+a.dir+' ❌ | PTB $'+fmt(ptb)+' → $'+fmt(exitPrice)+(tie?' (TIE)':''),'result');
    if(!S.mart.on&&S.mart.losses>=1){
      S.mart.on=true;
      addLog('🎲 Martingale AUTO-ON after 1st loss','warn');
      showToast('🎲 Martingale activated!','warn');
    }
    if(S.mart.on){
      const next=Math.min(a.stake*2,S.mart.maxBet);
      if(trueBalance()>=next){
        S.nextStake=next; S.mart.mult=next/S.mart.base;
        addLog('📈 Next stake: $'+next,'warn');
        showToast('-$'+a.stake+' LOSS · Next: $'+next,'loss');
      }else{
        S.nextStake=S.mart.base; S.mart.mult=1; S.mart.losses=0;
        addLog('⚠️ Martingale reset — balance low','warn');
        showToast('-$'+a.stake+' LOSS · Reset','loss');
      }
    }else{
      showToast('-$'+a.stake+' LOSS','loss');
    }
  }
  save(); render();
}

// ═══ 1-SECOND TIMER ══════════════════════════════════════════
setInterval(()=>{
  const now=Date.now();
  // Clock display
  const clk=document.getElementById('clk');
  const cb=document.getElementById('cbar');
  const cn=document.getElementById('cnext');
  const cs=document.getElementById('cslot');
  if(clk) clk.textContent=new Date(now).toLocaleTimeString('en-IN',{timeZone:'Asia/Kolkata',hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const secsLeft=Math.ceil((cur5mEnd()-now)/1000);
  const pct=Math.round((now%300000)/300000*100);
  if(cb){cb.style.width=pct+'%';cb.style.background=pct<5?'#00e676':pct>90?'#ffd740':'#3355ff';}
  if(cn){cn.textContent=secsLeft+'s';cn.style.color=secsLeft<15?'#ff1744':secsLeft<30?'#ffd740':'#ffd740';}
  if(cs){const m=new Date().getUTCMinutes();cs.textContent='slot '+(Math.floor(m/5)*5)+'-'+(Math.floor(m/5)*5+5)+'m';}

  // Check if active trade window expired
  if(S.active&&now>=S.active.windowEnd){
    addLog('⏰ Window closed — resolving trade...','info');
    resolveTrade();
    return;
  }

  // Update countdown in active trade display
  if(S.active){
    const el=document.getElementById('trade-timer');
    const pl=document.getElementById('trade-pnl');
    const left=Math.max(0,Math.ceil((S.active.windowEnd-now)/1000));
    if(el) el.textContent=left+'s';
    if(pl){
      const cur=S.btcPrice, ptb=S.active.priceToBeat;
      const winning=(S.active.dir==='UP'&&cur>ptb)||(S.active.dir==='DOWN'&&cur<ptb);
      pl.textContent=winning?'+$'+S.active.potProfit:'-$'+S.active.stake;
      pl.style.color=winning?'#00e676':'#ff1744';
    }
    // Progress bar
    const dur=(S.active.windowEnd-S.active.at)/1000;
    const elapsed=(now-S.active.at)/1000;
    const prg=document.getElementById('trade-prg');
    if(prg) prg.style.width=Math.min(100,elapsed/dur*100)+'%';
  }

  // Refresh PM odds at start of new 5-min window
  if(pct<3&&!S.refreshing){
    S.refreshing=true;
    fetchBTC().then(()=>fetchPM()).then(()=>render()).finally(()=>{S.refreshing=false;});
  }
},1000);

// Refresh price every 30s
setInterval(async()=>{ await fetchBTC(); render(); }, 30000);
// Autosave every 30s
setInterval(save, 30000);

// ═══ PERF ══════════════════════════════════════════════════════
function filterT(p){
  const now=Date.now(),d=new Date();
  if(p==='today'){const s=new Date(d.getFullYear(),d.getMonth(),d.getDate()).getTime();return S.trades.filter(t=>t.closedAt>=s);}
  if(p==='yesterday'){const e=new Date(d.getFullYear(),d.getMonth(),d.getDate()).getTime();return S.trades.filter(t=>t.closedAt>=e-86400000&&t.closedAt<e);}
  if(p==='weekly') return S.trades.filter(t=>t.closedAt>=now-7*86400000);
  if(p==='month')  return S.trades.filter(t=>t.closedAt>=now-30*86400000);
  return S.trades;
}
function calcStats(trades){
  const wins=trades.filter(t=>t.won),losses=trades.filter(t=>!t.won);
  const profit=wins.reduce((a,t)=>a+t.pnl,0);
  const lost=losses.reduce((a,t)=>a+t.stake,0);
  const net=+(profit-lost).toFixed(2);
  const wr=trades.length?Math.round(wins.length/trades.length*100):0;
  const avgW=wins.length?+(profit/wins.length).toFixed(2):0;
  const avgL=losses.length?+(lost/losses.length).toFixed(2):0;
  const pf=lost>0?+(profit/lost).toFixed(2):(profit>0?'∞':0);
  return{wins:wins.length,losses:losses.length,total:trades.length,profit,lost,net,wr,avgW,avgL,pf};
}

function renderHist(){
  const h=[];
  h.push('<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">');
  h.push('<div style="font-size:10px;color:#333360;letter-spacing:3px">TRADE HISTORY</div>');
  h.push('<button onclick="if(confirm(\'Reset all?\')){{S.trades=[];S.active=null;S.startBal=1000;S.mart={on:false,base:10,mult:1,losses:0,maxBet:180};S.nextStake=10;save();render();}}" style="padding:4px 10px;border-radius:7px;border:1px solid rgba(255,23,68,.3);background:transparent;color:#ff1744;font-family:inherit;font-size:9px;cursor:pointer">RESET</button>');
  h.push('</div>');
  if(S.trades.length===0){
    h.push('<div style="text-align:center;color:#333360;padding:30px;font-size:10px">No trades yet</div>');
    return h.join('');
  }
  h.push('<div style="overflow-x:auto"><table class="tbl" style="min-width:500px">');
  h.push('<thead><tr><th>TIME IST</th><th>DIR</th><th>ODDS</th><th>PTB $</th><th>EXIT $</th><th>DIFF%</th><th>STAKE</th><th>WIN</th><th>LOSS</th></tr></thead><tbody>');
  S.trades.slice(0,80).forEach(t=>{
    const dc=+t.diff>=0?'#00e676':'#ff1744';
    h.push('<tr>');
    h.push('<td style="color:#555588;white-space:nowrap">'+fmtIST(t.closedAt)+'</td>');
    h.push('<td><span class="'+(t.dir==='UP'?'ubadge':'dbadge')+'">'+(t.dir==='UP'?'▲':'▼')+t.dir+'</span></td>');
    h.push('<td style="color:#7799ff">'+t.odds+'¢</td>');
    h.push('<td>$'+fmt(t.priceToBeat)+'</td>');
    h.push('<td>$'+fmt(t.exit)+'</td>');
    h.push('<td style="color:'+dc+'">'+(+t.diff>=0?'+':'')+t.diff+'%</td>');
    h.push('<td>$'+t.stake+'</td>');
    h.push('<td style="color:#00e676;font-weight:700">'+(t.won?'+$'+t.pnl.toFixed(2):'—')+'</td>');
    h.push('<td style="color:#ff1744;font-weight:700">'+(!t.won?'-$'+t.stake:'—')+'</td>');
    h.push('</tr>');
  });
  h.push('</tbody></table></div>');
  return h.join('');
}

// ═══ RENDER ═══════════════════════════════════════════════════
function render(){
  const hp=document.getElementById('hp');
  const hb=document.getElementById('hb');
  const tb=trueBalance();
  if(hp){hp.textContent=S.btcPrice?'$'+fmt(S.btcPrice):'Loading...';hp.style.color=S.btcPrice?'#fff':'#888';}
  if(hb){hb.textContent='$'+tb.toFixed(2);hb.style.color=tb>=S.startBal?'#00e676':'#ff1744';}
  const el=document.getElementById('content');
  if(!el)return;
  if(S.screen==='trade')    el.innerHTML=renderTrade();
  else if(S.screen==='perf')el.innerHTML=renderPerf();
  else                       el.innerHTML=renderHist();
}

async function init(){
  await load();
  render();
  await fetchBTC();
  await fetchPM();
  render();
}
init();
